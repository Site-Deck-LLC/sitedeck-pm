version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sitedeck-pm-postgres
    environment:
      POSTGRES_USER: sitedeck
      POSTGRES_PASSWORD: sitedeck
      POSTGRES_DB: sitedeck_pm_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sitedeck -d sitedeck_pm_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
